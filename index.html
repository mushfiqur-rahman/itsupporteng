<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>itsupporteng - Remote IT Support Provider</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div class="glass-container">
      <div class="badge">Launching March 1st, 2026</div>

      <h1 class="main-title">itsupport<span>eng</span></h1>
      <p class="description">
        Global Tier-3 Support • Google Workspace Deployment • Secure
        Infrastructure
      </p>

      <div class="services-grid">
        <div class="service-item">
          <i class="fas fa-server"></i> Microsoft 365
        </div>
        <div class="service-item">
          <i class="fab fa-google"></i> Google Workspace
        </div>
        <div class="service-item">
          <i class="fas fa-envelope"></i> Email Systems
        </div>
        <div class="service-item">
          <i class="fas fa-headset"></i> Remote Support
        </div>
      </div>

      <div class="countdown" id="timer">
        <div class="unit"><span id="days">00</span><label>Days</label></div>
        <div class="unit"><span id="hours">00</span><label>Hours</label></div>
        <div class="unit"><span id="mins">00</span><label>Mins</label></div>
        <div class="unit"><span id="secs">00</span><label>Secs</label></div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
